<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Papers - CV / VLM / MedAI</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-title-row">
                <h1>📚 Daily Papers</h1>
                <a
                    class="header-github-link"
                    href="https://github.com/JW-Yuan/daily-papers-rec"
                    target="_blank"
                    rel="noopener noreferrer"
                    title="在 GitHub 打开本仓库"
                    aria-label="GitHub 源码仓库"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98 96" aria-hidden="true" focusable="false"><path fill="currentColor" fill-rule="evenodd" clip-rule="evenodd" d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.061-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 13.6-.08 24.583-.08 27.834 0 2.36 1.708 5.096 3.316 4.072C83.42 89.403 97.4 71.006 97.4 49.217 97.4 22 75.464 0 48.854 0z"/></svg>
                </a>
            </div>
            <p class="header-start" id="headerStartFrom">Updated daily at 07:00.</p>
            <p class="subtitle">计算机视觉 · 多模态大模型 · 医疗影像 AI</p>
            <p class="desc">每日精选 CVPR/ICCV/ECCV/ICML/ICLR/MICCAI 顶会、TPAMI/TMI/MIA 顶刊与 arXiv 最新论文</p>
        </div>
    </header>

    <nav class="nav-bar">
        <div class="container">
            <div class="nav-controls">
                <!-- 日历选择器 -->
                <div class="calendar-wrapper">
                    <button class="nav-btn calendar-btn" id="calendarBtn" title="选择日期">
                        📅 <span id="currentDate">今日</span>
                    </button>
                    <button class="nav-btn clear-date-btn" id="clearDateBtn" title="清除已选日期，回到今日">
                        ✖ 清除日期
                    </button>
                    <div class="calendar-dropdown" id="calendarDropdown">
                        <div class="calendar-select-row" aria-label="选择年月">
                            <select id="yearSelect" class="calendar-select" title="年份"></select>
                            <span class="calendar-select-sep">年</span>
                            <select id="monthSelect" class="calendar-select" title="月份"></select>
                            <span class="calendar-select-sep">月</span>
                        </div>
                        <div class="calendar-header">
                            <button type="button" class="cal-nav" id="prevMonth" aria-label="上一月">◀</button>
                            <span id="calendarMonth" class="calendar-month-label">2026年4月</span>
                            <button type="button" class="cal-nav" id="nextMonth" aria-label="下一月">▶</button>
                        </div>
                        <div class="calendar-grid" id="calendarGrid">
                            <!-- 日历格子由 JS 生成 -->
                        </div>
                    </div>
                </div>

                <!-- 今日推荐按钮 -->
                <button class="nav-btn today-btn" id="todayBtn" title="回到今日">
                    📌 今日推荐
                </button>

                <!-- 筛选按钮 -->
                <div class="filter-wrapper">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="conference">🏆 顶会</button>
                    <button class="filter-btn" data-filter="journal">📘 顶刊</button>
                    <button class="filter-btn" data-filter="arxiv">📄 arXiv</button>
                </div>
            </div>
            <div class="search-row" aria-label="条件搜索">
                <input
                    type="text"
                    id="searchKeyword"
                    class="search-input search-keyword"
                    placeholder="按标题/关键词搜索（支持模糊匹配）"
                    title="按标题或关键词搜索"
                >
                <button type="button" id="searchApplyBtn" class="search-btn search-btn-primary">搜索</button>
                <button type="button" id="searchResetBtn" class="search-btn">重置</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- 论文列表页 -->
        <div id="papers-list-view" class="papers-container">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载论文...</p>
            </div>
        </div>

        <!-- 论文详情页 -->
        <div id="paper-detail-view" class="paper-detail-page" style="display: none;">
            <div class="detail-page-header">
                <button type="button" class="back-btn" id="backToListBtn">
                    ← 返回列表
                </button>
            </div>
            <div class="detail-page-content">
                <h1 id="detail-page-title" class="detail-page-title"></h1>
                <div id="detail-page-body"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p><a href="https://github.com/JW-Yuan/daily-papers-rec" target="_blank">GitHub Repository</a></p>
        </div>
    </footer>

    <button
        type="button"
        id="scrollTopBtn"
        class="scroll-top-btn"
        aria-label="回到顶部"
        title="回到顶部"
    >↑</button>

    <script src="assets/js/app.js"></script>
</body>
</html>
